<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Detail Produk - Online Shop</title>
    <meta
      name="description"
      content="Detail produk fashion wanita dengan galeri foto, cart, checkout, ekspedisi, dan pembayaran."
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="market-header">
      <div class="market-top">
        <a href="index.html">Online Shop</a>
        <span>Detail Produk</span>
        <span>Pembayaran lengkap</span>
      </div>

      <div class="market-main">
        <a class="market-brand" href="index.html" aria-label="Online Shop">
          <span class="bag-mark">O</span>
          <span>Online Shop</span>
        </a>

        <form class="search-box" id="detailSearchForm">
          <input id="detailSearchInput" type="search" placeholder="Cari produk lain di toko..." />
          <button class="search-submit" type="submit" aria-label="Cari">
            <svg class="search-icon-svg" viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="11" cy="11" r="6.5"></circle>
              <path d="m16 16 4 4"></path>
            </svg>
          </button>
        </form>

        <button class="cart-link cart-with-icon" id="cartOpen" type="button" aria-label="Buka keranjang">
          <svg class="nav-icon-svg" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M3 4h2l1.7 8.2a2 2 0 0 0 2 1.6h7.8a2 2 0 0 0 2-1.6L20 7H6"></path>
            <circle cx="9" cy="19" r="1.2"></circle>
            <circle cx="17" cy="19" r="1.2"></circle>
          </svg>
          <span class="nav-label">Keranjang</span><span class="count-badge" id="cartCount">0</span>
        </button>
      </div>
    </header>

    <main class="page-shell detail-page">
      <section class="detail-panel" id="productDetail"></section>

      <section class="product-checkout" id="checkout">
        <h2>Checkout Produk Ini</h2>
        <form id="buyForm">
          <div class="checkout-address-card">
            <div class="address-card-head">
              <div>
                <strong>Alamat Pengiriman</strong>
                <span>Isi data pembeli dan alamat lengkap sebelum bayar.</span>
              </div>
              <button class="address-edit-button" id="addressOpen" type="button">+ Alamat Baru</button>
            </div>
            <div class="address-preview empty" id="addressPreview">Belum ada alamat. Klik Alamat Baru untuk mengisi alamat pembeli.</div>
          </div>

          <input type="hidden" name="name" id="buyerNameField" />
          <input type="hidden" name="phone" id="buyerPhoneField" />
          <input type="hidden" name="street" id="buyerStreetField" />
          <input type="hidden" name="district" id="buyerDistrictField" />
          <input type="hidden" name="city" id="buyerCityField" />
          <input type="hidden" name="province" id="buyerProvinceField" />
          <input type="hidden" name="postal" id="buyerPostalField" />

          <div class="form-row">
            <label>
              Pilih Ekspedisi
              <select name="shipping" id="shippingSelect" required></select>
            </label>
            <label>
              Metode Pembayaran
              <select name="payment" id="paymentSelect" required></select>
            </label>
          </div>
          <div class="form-row">
            <label>
              Nomor Pembayaran
              <input id="paymentNumber" name="paymentNumber" readonly placeholder="Pilih metode pembayaran" />
            </label>
          </div>
          <div class="payment-guide" id="paymentGuide"></div>
          <button class="primary-button" type="submit">Buat Pesanan dan Bayar</button>
          <div class="payment-result" id="paymentResult" hidden></div>
        </form>
      </section>
    </main>

    <aside class="drawer" id="cartDrawer" aria-hidden="true">
      <div class="drawer-panel">
        <div class="drawer-head">
          <h2>Keranjang</h2>
          <button class="close-button" id="cartClose" type="button" aria-label="Tutup keranjang">&times;</button>
        </div>
        <div class="cart-items" id="cartItems"></div>
        <div class="cart-summary">
          <span>Total Produk</span>
          <strong id="cartSubtotal">Rp0</strong>
        </div>
        <a class="primary-button full" href="#checkout" id="checkoutJump">Checkout Produk Ini</a>
      </div>
    </aside>



    <div class="address-modal-backdrop" id="addressModal" hidden>
      <div class="address-modal" role="dialog" aria-modal="true" aria-labelledby="addressModalTitle">
        <button class="address-close" id="addressClose" type="button" aria-label="Tutup alamat">&times;</button>
        <h2 id="addressModalTitle">Alamat Baru</h2>

        <div class="address-input-row">
          <input id="addressName" type="text" placeholder="Nama Lengkap" />
          <input id="addressPhone" type="tel" placeholder="Nomor Telepon" />
        </div>

        <div class="address-search-field">
          <input id="addressSearch" type="text" placeholder="Provinsi, Kota/Kabupaten, Kecamatan, Kode Pos" readonly />
          <span class="address-search-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <circle cx="11" cy="11" r="6.5"></circle>
              <path d="m16 16 4 4"></path>
            </svg>
          </span>
          <span class="address-caret" aria-hidden="true">⌄</span>
        </div>

        <div class="address-picker-box">
          <div class="address-tabs" role="tablist" aria-label="Pilih alamat">
            <button class="active" type="button" data-address-tab="province">Provinsi</button>
            <button type="button" data-address-tab="city">Kota / Kabupaten</button>
            <button type="button" data-address-tab="district">Kecamatan</button>
            <button type="button" data-address-tab="postal">Kode Pos</button>
          </div>
          <div class="address-options" id="addressOptions"></div>
        </div>

        <label class="address-detail-label">
          Tulis Alamat
          <textarea id="addressStreet" rows="3" placeholder="Nama jalan, nomor rumah, RT/RW, patokan, atau detail lainnya"></textarea>
        </label>

        <div class="address-tag-row" role="group" aria-label="Label alamat">
          <button class="address-tag active" type="button" data-address-tag="Rumah">Rumah</button>
        </div>

        <div class="address-modal-actions">
          <button class="address-ok" id="addressOk" type="button">OK</button>
        </div>
      </div>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="store-data.js"></script>
    <script src="region-data.js"></script>
    <script src="product-page.js"></script>
  </body>
</html>
